<!DOCTYPE html>
<html lang="en" data-theme="night">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guitar Mode Finder</title>
<meta name="description" content="Find any guitar mode in any key. See the full scale family, diatonic 7th chords, pentatonic subset, and full fretboard diagrams. Free, fast, no ads.">
<link rel="canonical" href="https://guitarmodefinder.com/">
<meta property="og:title" content="Guitar Mode Finder">
<meta property="og:description" content="Find any guitar mode in any key. See the full scale family, diatonic 7th chords, pentatonic subset, and full fretboard diagrams.">
<meta property="og:url" content="https://guitarmodefinder.com/">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">
<link rel="stylesheet" href="/css/main.css">
<link rel="icon" href="/mascot.png" type="image/jpeg">
<link rel="icon" href="/favicon.ico" type="image/x-icon">
</head>
<body>

<!-- ── Sticky Header Rack Bar ─────────────────────────────────────────────── -->
<header class="rack-header">
  <div class="rack-header-inner">
    <div class="screw screw-tl"></div>
    <div class="screw screw-tr"></div>
    <div class="screw screw-bl"></div>
    <div class="screw screw-br"></div>

    <div class="rack-brand">
      <img src="/mascot.png" alt="Guitar Mode Finder" class="brand-logo">
      <div>
        <h1 class="brand-label-main">Guitar Mode Finder</h1>
      </div>
    </div>

    <nav class="rack-nav">
      <a href="/" class="active">MODES</a>

      <button class="theme-toggle" id="themeToggle" aria-label="Toggle day/night theme">
        <span class="toggle-label" id="labelDay">DAY</span>
        <span class="toggle-track"><span class="toggle-ball"></span></span>
        <span class="toggle-label active" id="labelNight">NIGHT</span>
      </button>
    </nav>
  </div>
</header>

<!-- ── Rack Modules ─────────────────────────────────────────────────────────── -->
<main class="rack">

  <!-- CH·01 SCALE LOOKUP -->
  <div class="rack-module" id="mod-lookup">
    <div class="screw screw-tl"></div><div class="screw screw-tr"></div>
    <div class="screw screw-bl"></div><div class="screw screw-br"></div>
    <div class="rack-module-header">
      <span class="rack-module-title">CH·01 / SCALE LOOKUP</span>
    </div>
    <div class="rack-module-body">
      <div class="lookup-grid">
        <div class="lookup-controls">
          <div class="knob-wrap" id="root-knob"></div>
          <div class="knob-wrap" id="mode-knob"></div>
        </div>
        <div class="lookup-readout">
          <div class="led-display" id="led-display">
            <div class="led-header-row">NOW PLAYING</div>
            <div class="led-mode-name" id="led-name">C IONIAN</div>
            <div class="led-parent-key" id="led-parent-key">PARENT: C MAJOR</div>
            <div class="led-parent-notes" id="led-parent-notes">C · D · E · F · G · A · B</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- CH·02 FRETBOARD -->
  <div class="rack-module" id="mod-fretboard">
    <div class="screw screw-tl"></div><div class="screw screw-tr"></div>
    <div class="screw screw-bl"></div><div class="screw screw-br"></div>
    <div class="rack-module-header">
      <span class="rack-module-title">FRETBOARD · STANDARD TUNING · 15F</span>
    </div>
    <div class="rack-module-body">
      <div class="fretboard-svg-wrap" id="fretboard-wrap"></div>
      <div class="fretboard-legend" id="fretboard-legend"></div>
    </div>
  </div>

  <!-- CH·03 CHARACTER -->
  <div class="rack-module" id="mod-character">
    <div class="screw screw-tl"></div><div class="screw screw-tr"></div>
    <div class="screw screw-bl"></div><div class="screw screw-br"></div>
    <div class="rack-module-header">
      <span class="rack-module-title" id="char-title">CHARACTER · BRIGHT, RESOLVED</span>
    </div>
    <div class="rack-module-body">
      <div class="character-grid" id="character-grid"></div>
    </div>
  </div>

  <!-- CH·04 PARENT FAMILY -->
  <div class="rack-module" id="mod-family">
    <div class="screw screw-tl"></div><div class="screw screw-tr"></div>
    <div class="screw screw-bl"></div><div class="screw screw-br"></div>
    <div class="rack-module-header">
      <span class="rack-module-title" id="family-title">PARENT FAMILY · C MAJ</span>
    </div>
    <div class="rack-module-body">
      <div class="family-list" id="family-list"></div>
    </div>
  </div>

  <!-- CH·05 CHORD PAD -->
  <div class="rack-module" id="mod-chords">
    <div class="screw screw-tl"></div><div class="screw screw-tr"></div>
    <div class="screw screw-bl"></div><div class="screw screw-br"></div>
    <div class="rack-module-header">
      <span class="rack-module-title">DIATONIC 7ths · CHORD DISPLAY</span>
    </div>
    <div class="rack-module-body">
      <div class="led-display chord-led" id="chord-display"></div>
    </div>
  </div>


</main>

<footer class="rack-footer">
  &copy; 2026 Guitar Mode Finder
</footer>

<script src="/js/theory.js"></script>
<script src="/js/ui.js"></script>
</body>
</html>
